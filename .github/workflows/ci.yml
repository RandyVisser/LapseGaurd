name: CI

# Build + import checks on every push/PR to main. Fails (red ❌) if the frontend
# won't build or the backend won't compile/import — i.e. catches the white-screen
# / startup-crash class before it reaches the live site. Does NOT catch behavior
# bugs (that's what the E2E tests + a manual smoke-test are for).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Build the frontend (catches white-screen / build crashes)
        run: npm run build

  backend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Compile-check all modules (syntax errors)
        run: python -m compileall -q .
      - name: Import-check (app imports cleanly — catches bad imports / undefined names)
        run: python -c "import main"
